services:
  target-db:
    shm_size: "${JOB_IMDB_TARGET_DB_SHM_SIZE:-4gb}"

  data-loader:
    environment:
      BENCHMARK: job-imdb
      JOB_IMDB_DATA_DIR: /workspace/data/job-imdb
      JOB_IMDB_SKIP_TARGET_LOAD: "${JOB_IMDB_SKIP_TARGET_LOAD:-false}"
    volumes:
      - ./data/job-imdb:/workspace/data/job-imdb:ro

  ollama-model-pull:
    image: ollama/ollama:0.20.7
    profiles: ["llm-local"]
    environment:
      OLLAMA_HOST: http://ollama:11434
      DEFAULT_MODEL: "${DEFAULT_MODEL:-}"
    entrypoint:
      - /bin/sh
      - -lc
    command:
      - |
        set -eu
        ollama pull "$${DEFAULT_MODEL}"
    depends_on:
      ollama:
        condition: service_healthy

  rewrite-service:
    environment:
      ENABLE_RULES: "${JOB_IMDB_ENABLE_RULES:-true}"
      ENABLE_LLM: "${JOB_IMDB_ENABLE_LLM:-false}"
      DEFAULT_MODEL: "${DEFAULT_MODEL:-}"
      TEMPERATURE: "${JOB_IMDB_TEMPERATURE:-0.5}"
    depends_on:
      ollama-model-pull:
        condition: service_completed_successfully
        required: false

  workload-runner:
    environment:
      OPTIMIZER_PROFILE: "${JOB_IMDB_OPTIMIZER_PROFILE:-job-imdb}"
      QUERIES_PATH: "/app/job-imdb/queries"
      PARAMETERS_PATH: "/app/job-imdb/parameters"
      WORKLOAD_MANIFEST_FILE: "${JOB_IMDB_WORKLOAD_MANIFEST_FILE:-/app/job-imdb/job-imdb-rule-corpus.json}"
      EXPERIMENT_RUN_ID: "${JOB_IMDB_RESULT_RUN_ID:-latest}"
      RUN_HELD_OUT_EVALUATION: "${JOB_IMDB_RUN_HELD_OUT_EVALUATION:-false}"
      ALLOWED_RULE_FAMILIES: "${JOB_IMDB_ALLOWED_RULE_FAMILIES:-A,B,C,D,E}"
      ENABLE_RULES: "${JOB_IMDB_ENABLE_RULES:-true}"
      ENABLE_LLM: "${JOB_IMDB_ENABLE_LLM:-false}"
      DEFAULT_MODEL: "${DEFAULT_MODEL:-}"
      MAX_LLM_CANDIDATES: "${JOB_IMDB_MAX_LLM_CANDIDATES:-0}"
      MODEL_TIMEOUT_SECONDS: "${JOB_IMDB_MODEL_TIMEOUT_SECONDS:-600}"
      REWRITE_SERVICE_HTTP_TIMEOUT_SECONDS: "${JOB_IMDB_REWRITE_SERVICE_HTTP_TIMEOUT_SECONDS:-1800}"
      EQUIVALENCE_TIMEOUT_MS: "${JOB_IMDB_EQUIVALENCE_TIMEOUT_MS:-900000}"
      EQUIVALENCE_MAX_ROWS_FULL_COMPARE: "${JOB_IMDB_EQUIVALENCE_MAX_ROWS_FULL_COMPARE:-1000000}"
      VALIDATION_PARAMETER_SET_LIMIT: "${JOB_IMDB_VALIDATION_PARAMETER_SET_LIMIT:-3}"
      CAPTURE_EXPLAIN_PLANS: "${JOB_IMDB_CAPTURE_EXPLAIN_PLANS:-true}"
      TEMPERATURE: "${JOB_IMDB_TEMPERATURE:-0.5}"
      BENCHMARK_ITERATIONS: "${JOB_IMDB_BENCHMARK_ITERATIONS:-1}"
      OPTIMIZER_MIN_EXECUTION_COUNT: "${JOB_IMDB_MIN_PROMOTION_PAIRS:-30}"
      PROMOTION_ALPHA: "${JOB_IMDB_PROMOTION_ALPHA:-0.05}"
      PROMOTION_MIN_IMPROVEMENT_PCT: "${JOB_IMDB_PROMOTION_MIN_IMPROVEMENT_PCT:-2.0}"
      PROMOTION_MAX_CANDIDATE_CV: "${JOB_IMDB_PROMOTION_MAX_CANDIDATE_CV:-0.3}"
      BANDIT_STRATEGY: "${JOB_IMDB_BANDIT_STRATEGY:-thompson}"
      BANDIT_RANDOM_SEED: "${JOB_IMDB_BANDIT_RANDOM_SEED:-12345}"
      BANDIT_OBSERVATION_VARIANCE: "${JOB_IMDB_BANDIT_OBSERVATION_VARIANCE:-0.1}"
      UCB1_EXPLORATION_COEFFICIENT: "${JOB_IMDB_UCB1_EXPLORATION_COEFFICIENT:-1.4142135623730951}"
      BACKGROUND_OPTIMIZER_ROUNDS: "${JOB_IMDB_BACKGROUND_OPTIMIZER_ROUNDS:-1}"
      BACKGROUND_OPTIMIZER_PARAMETER_LIMIT: "${JOB_IMDB_BACKGROUND_OPTIMIZER_PARAMETER_LIMIT:-30}"
    volumes:
      - ${JOB_IMDB_WORKLOAD_HOST_PATH:-./benchmark-data/job-imdb/workload}:/app/job-imdb:ro

  job-imdb-results-exporter:
    image: postgres:18.3
    environment:
      METADATA_DB_HOST: metadata-db
      METADATA_DB_PORT: "5432"
      METADATA_DB_NAME: optimizer
      METADATA_DB_USER: postgres
      METADATA_DB_PASSWORD: postgres
      TPCH_RESULT_RUN_ID: "${JOB_IMDB_RESULT_RUN_ID:-latest}"
    command: ["sh", "/workspace/scripts/export-tpch-results.sh"]
    volumes:
      - ./scripts/export-tpch-results.sh:/workspace/scripts/export-tpch-results.sh:ro
      - ${JOB_IMDB_RESULTS_HOST_PATH:-./experiment-runs/job-imdb-evaluation}:/workspace/results
    depends_on:
      metadata-db:
        condition: service_healthy
